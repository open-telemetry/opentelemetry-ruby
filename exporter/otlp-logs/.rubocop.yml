inherit_from:
  - ../../contrib/rubocop.yml

AllCops:
  Exclude:
    - "lib/opentelemetry/proto/**/*"
    - "vendor/**/*"

Lint/DuplicateBranch:
  Enabled: false
Lint/SuppressedExceptionInNumberConversion:
  Enabled: false
Performance/MapCompact:
  Enabled: false
Performance/MethodObjectAsBlock:
 Enabled: false
