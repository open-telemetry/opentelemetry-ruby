inherit_from: ../../contrib/rubocop.yml

AllCops:
  Exclude:
    - "lib/opentelemetry/proto/**/*"
    - "vendor/**/*"

Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false
Performance/MapCompact:
  Enabled: false
Performance/MethodObjectAsBlock:
  Enabled: false
