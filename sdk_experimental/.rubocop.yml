inherit_from: ../contrib/rubocop.yml

Metrics/AbcSize:
  Max: 30
Metrics/MethodLength:
  Max: 50
Metrics/PerceivedComplexity:
  Max: 30
Metrics/CyclomaticComplexity:
  Max: 20

Lint/AmbiguousOperatorPrecedence:
  Enabled: false
Lint/DuplicateBranch:
  Enabled: false
Style/NegatedIfElseCondition:
  Enabled: false
